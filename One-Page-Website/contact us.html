             <section>
                <div>
                    <h3>Please provide your contact information

                    </h3>
                    <div>
                     <form>
                        <input type="text" placeholder="First Name" style="width:200px; border-radius:5px; margin-bottom:10px;">

                        <input type="tel" placeholder="Phone Number" style="width:200px; border-radius:5px; margin-bottom:10px;"><br>
                        <input type="checkbox" id="Newsletter">
                        <label for="Newsletter">Would you like to receive our monthly newsletter?</label><br>
                        <textarea placeholder="Type message here..." style="width:400px; height:100px; border-radius:5px; margin-bottom:10px;"></textarea><br>
                        <input type="submit" value="Submit" style="width:150px; border-radius:5px; margin-bottom:10px;">

                    </div>
                </div>
             </section>
